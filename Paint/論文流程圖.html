<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>論文流程圖</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "標楷體", "DFKai-SB", "Microsoft JhengHei", serif;
  background: #ffffff;
  padding: 60px 40px;
  display: flex;
  justify-content: center;
}

.flow-wrap {
  width: 100%;
  max-width: 700px;
}

.stage {
  display: flex;
  align-items: center;
  margin-bottom: 28px;
}

.stage:last-child { margin-bottom: 0; }

.box {
  flex: 1;
  background: #ffffff;
  border: 1px solid #000;
  padding: 20px 28px;
  text-align: center;
}

.box-title {
  font-size: 20px;
  color: #000;
  margin-bottom: 8px;
}

.box-sub {
  font-size: 16px;
  color: #333;
}

.arrow {
  text-align: center;
  margin: 0 auto 28px;
  color: #000;
  font-size: 28px;
  line-height: 1;
}

.caption {
  text-align: center;
  margin-top: 40px;
  font-size: 18px;
  color: #000;
}
</style>
</head>
<body>

<div class="flow-wrap">

  <div class="stage">
    <div class="box">
      <div class="box-title">確認研究方向、訂定研究題目</div>
      <div class="box-sub">深度強化學習於虛擬實境邊緣運算之動態卸載研究</div>
    </div>
  </div>
  <div class="arrow">↓</div>

  <div class="stage">
    <div class="box">
      <div class="box-title">文獻探討</div>
      <div class="box-sub">VR 雲端串流、行動邊緣運算、深度強化學習、Sim-to-Real 遷移</div>
    </div>
  </div>
  <div class="arrow">↓</div>

  <div class="stage">
    <div class="box">
      <div class="box-title">研究方法設計</div>
      <div class="box-sub">問題建模、AI 代理人 (PPO+LSTM)、規則控制器</div>
    </div>
  </div>
  <div class="arrow">↓</div>

  <div class="stage">
    <div class="box">
      <div class="box-title">系統實作與模擬訓練</div>
      <div class="box-sub">Unity ML-Agents Toolkit、三階段漸進式訓練</div>
    </div>
  </div>
  <div class="arrow">↓</div>

  <div class="stage">
    <div class="box">
      <div class="box-title">實機部署</div>
      <div class="box-sub">Meta Quest 2、ONNX 模型轉換、Observation 對齊</div>
    </div>
  </div>
  <div class="arrow">↓</div>

  <div class="stage">
    <div class="box">
      <div class="box-title">對照實驗與結果分析</div>
      <div class="box-sub">AI 代理人組與規則控制組於模擬與實機環境之對照</div>
    </div>
  </div>
  <div class="arrow">↓</div>

  <div class="stage">
    <div class="box">
      <div class="box-title">結論與未來展望</div>
      <div class="box-sub">研究成果整理、實務貢獻、後續研究方向</div>
    </div>
  </div>

</div>

</body>
</html>
