<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>三階段訓練流程 - 精簡版</title>
<style>
  body {
    font-family: "Microsoft JhengHei", "Helvetica Neue", sans-serif;
    background: #ffffff;
    padding: 50px 60px;
    margin: 0;
    color: #2C3E50;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
  }

  /* 縱向時間軸底色 */
  .timeline {
    position: absolute;
    left: 28px;
    top: 24px;
    bottom: 24px;
    width: 2px;
    background: #D0D7E2;
  }

  /* 漸層色帶 */
  .timeline-fill {
    position: absolute;
    left: 28px;
    top: 24px;
    width: 2px;
    background: linear-gradient(to bottom, #3D5A80, #1E3A5F, #C9A961);
    height: calc(100% - 48px);
  }

  .stage {
    position: relative;
    padding: 18px 0 38px 78px;
  }

  .stage:last-child {
    padding-bottom: 18px;
  }

  /* 時間軸節點圓點 */
  .stage::before {
    content: "";
    position: absolute;
    left: 19px;
    top: 26px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 3px solid;
    background: #ffffff;
    z-index: 2;
  }

  .stage-1::before { border-color: #3D5A80; }
  .stage-2::before { border-color: #1E3A5F; }
  .stage-3::before {
    border-color: #C9A961;
    background: #C9A961;
  }

  /* 階段標籤 */
  .stage-label {
    display: inline-block;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 3px;
    margin-bottom: 12px;
    font-family: "Consolas", monospace;
  }
  .stage-1 .stage-label { background: #E8EDF4; color: #3D5A80; }
  .stage-2 .stage-label { background: #D4DCE8; color: #1E3A5F; }
  .stage-3 .stage-label { background: #152A47; color: #C9A961; }

  /* 大標題 */
  .title {
    font-size: 26px;
    font-weight: 700;
    color: #1E3A5F;
    margin: 0 0 10px 0;
    line-height: 1.2;
  }

  /* 一句話描述 */
  .purpose {
    font-size: 18px;
    color: #2C3E50;
    margin: 0;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">

  <div class="timeline"></div>
  <div class="timeline-fill"></div>

  <div class="stage stage-1">
    <span class="stage-label">Stage 01 / Pretrain</span>
    <p class="title">基礎泛化</p>
    <p class="purpose">在大範圍壓力分布下學會基本平衡</p>
  </div>

  <div class="stage stage-2">
    <span class="stage-label">Stage 02 / Refine</span>
    <p class="title">穩定收斂</p>
    <p class="purpose">把策略收斂到穩定區間</p>
  </div>

  <div class="stage stage-3">
    <span class="stage-label">Stage 03 / Finetune</span>
    <p class="title">目標微調</p>
    <p class="purpose">把策略往 MTP &lt; 35ms 的方向收緊</p>
  </div>

</div>
</body>
</html>
